name: Release tauri-vue-bi

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - 'tauri-vue-bi-v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    name: publish-tauri (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel (DMG)
            platform: macos-15-intel
            args: --target x86_64-apple-darwin --bundles dmg
          - name: macOS Apple Silicon (DMG)
            platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
          - name: Linux
            platform: ubuntu-22.04
            args: ''
          - name: Windows
            platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libfuse2

      - name: Configure AppImage runtime for CI
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Build sidecar runtime (.venv)
        run: uv sync --project Data-Analysis-Agent

      - name: Prepare sidecar resources (with embedded .venv)
        run: python scripts/prepare_sidecar_runtime.py --source Data-Analysis-Agent --target src-tauri/resources/Data-Analysis-Agent --require-venv

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.event.inputs.release_tag || github.ref_name }}
          releaseName: BI 分析工具 ${{ github.event.inputs.release_tag || github.ref_name }}
          releaseBody: |
            Automated release for tauri-vue-bi.

            Artifacts included:
            - macOS DMG (Intel: x86_64)
            - macOS DMG (Apple Silicon: arm64)
            - Windows installer
            - Linux package bundle
          releaseDraft: false
          prerelease: false
          includeDebug: false
          args: ${{ matrix.args }}
